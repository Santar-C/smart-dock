    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap');
        
        body { 
            background-color: #f8fafc; 
            font-family: 'Prompt', 'Inter', sans-serif;
        }
        .dock-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .dock-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes scanline { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .animate-scan { animation: scanline 2.5s infinite linear; }
        .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #html5-qrcode-button-camera-start, #html5-qrcode-button-camera-stop { 
            background-color: #4f46e5; color: white; border: none; padding: 10px 20px; 
            border-radius: 9999px; font-weight: 600; cursor: pointer; margin-top: 15px; margin-bottom: 15px; 
            transition: all 0.2s;
        }
        #html5-qrcode-button-camera-start:hover { background-color: #4338ca; }
        #html5-qrcode-button-camera-stop { background-color: #ef4444; }
        #html5-qrcode-button-camera-stop:hover { background-color: #dc2626; }
        #reader { border: none !important; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        #reader video { border-radius: 16px; object-fit: cover; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; background-color: white !important; }
            .print-hidden { display: none !important; }
            #print-area .grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 20px !important; }
        }
    </style>
</head>

                updateLate: "Last Update:",
                planOut: "Plan Out",
                actualArr: "Actual Arrived",

                dockBusyTitle: "Busy (Temporarily Closed)",
                dockMaintTitle: "Under Maintenance",
                clickToChange: "Click to change status",
                scheduleTitle: "DAS Schedule Timeline",

                qrSub: "Scan point for auto-status update",
                btnPrint: "Print Badges",
                reportTitle: "Completed Transaction History",
                btnExport: "Export Excel & Clear",
                thDate: "Date",
                thJob: "DO / Company",
                thLicense: "License Plate",
                thDock: "Dock",
                thPlanIn: "Plan In",
                thPlanOut: "Plan Out",
                thAction: "Action",
                scanTitle: "Auto Queue Scanner",
                scanInst: "💡 Scan Sequence: 1. Arrived 👉 2. Loading 👉 3. Wait Doc 👉 4. Completed",
                btnScanCont: "Scan Next",
                camOff: "Camera is off",
                btnCamOpen: "📷 Open Camera",
                btnCamClose: "Close Camera",
                noData: "No data available",
                modalTitle: "Manage Docks (Admin Only)",
                addDockPlaceholder: "New dock name...",
                btnAdd: "Add",
                btnToggle: "Toggle",
                btnDel: "Delete",
                statusObj: {
                    'Pending': 'Pending',
                    'Arrived': '1. Arrived',
                    'Loading': '2. Loading',
                    'WaitingDoc': '3. Wait Doc',
                    'Completed': '4. Completed'
                }
            }
        };

        const STATUS_COLORS = {
            'Pending': 'bg-slate-100 text-slate-600 border-slate-300 hover:bg-slate-200',
            'Arrived': 'bg-sky-100 text-sky-700 border-sky-300 hover:bg-sky-200',
            'Loading': 'bg-purple-100 text-purple-700 border-purple-300 hover:bg-purple-200',
            'WaitingDoc': 'bg-orange-100 text-orange-700 border-orange-300 hover:bg-orange-200',
            'Completed': 'bg-emerald-100 text-emerald-700 border-emerald-300 hover:bg-emerald-200'
        };
        const STATUSES = Object.keys(STATUS_COLORS);

        const INITIAL_DOCKS = Array.from({length: 9}, (_, i) => ({
            name: `Dock ${String(i + 1).padStart(2, '0')}`,
            status: 'Available'
        }));

        const safeParseArray = (val) => {
            if (!val) return [];
            if (Array.isArray(val)) return val.filter(item => item !== null);
            return Object.values(val).filter(item => item !== null);
        };

        const { useState, useEffect } = React;

        function App() {
          const [lang, setLang] = useState('th'); // Language State
          const t = (key) => t_dict[lang][key];   // Translation Helper

          const [bookings, setBookings] = useState(() => {
              try { return localStorage.getItem('smartdock_bookings') ? safeParseArray(JSON.parse(localStorage.getItem('smartdock_bookings'))) : []; } catch(e) { return []; }
          });
          const [docksList, setDocksList] = useState(() => {
              try {
                  const saved = localStorage.getItem('smartdock_docks');
                  if (saved) return safeParseArray(JSON.parse(saved)).map(d => typeof d === 'string' ? { name: d, status: 'Available' } : d);
              } catch(e) { }
              return INITIAL_DOCKS;
          });
          
          const [currentUserRole, setCurrentUserRole] = useState('Admin'); 
          const [currentTime, setCurrentTime] = useState(new Date());
          const [isDockModalOpen, setIsDockModalOpen] = useState(false);
          const [newDockName, setNewDockName] = useState('');
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isScanning, setIsScanning] = useState(false);
          const [scanResult, setScanResult] = useState({ text: '', isSuccess: false });
          const [isCloudConnected, setIsCloudConnected] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [formData, setFormData] = useState({
            date: getTodayStr(), startTime: '', endTime: '', shipmentNo: '', vendor: '', packageType: 'พาเลท', qty: '', license: '', vehicle: 'รถ 4 ล้อ', jobType: 'รับเข้า (IN)', allocation: 'Waitlist'
          });

          // Role Permissions
          const isPowerUser = ['Admin', 'Ship Co'].includes(currentUserRole); 
          const isSup = currentUserRole === 'Sup'; 
          const canChangeDockStatus = ['Admin', 'Sup'].includes(currentUserRole); 
          const isOperative = currentUserRole === 'พนักงาน'; 
          const canManageDocks = ['Admin'].includes(currentUserRole); 

          useEffect(() => {
              if (!isPowerUser && ['list', 'reports', 'schedule', 'barcode'].includes(activeTab)) {
                  setActiveTab('dashboard'); 
              }
          }, [currentUserRole, activeTab, isPowerUser]);

          // Firebase Sync
          const syncBookingsData = (newData) => {
              const safeData = newData || [];
              setBookings(safeData); 
              localStorage.setItem('smartdock_bookings', JSON.stringify(safeData)); 
              db.ref('smartdock/bookings').set(safeData).catch(console.error); 
          };
          const syncDocksData = (newData) => {
              const safeData = newData || INITIAL_DOCKS;
              setDocksList(safeData);
              localStorage.setItem('smartdock_docks', JSON.stringify(safeData));
              db.ref('smartdock/docks').set(safeData).catch(console.error);
          };

          useEffect(() => {
              const bookingsRef = db.ref('smartdock/bookings');
              const docksRef = db.ref('smartdock/docks');
              bookingsRef.on('value', (snapshot) => {
                  try {
                      const data = safeParseArray(snapshot.val());
                      setBookings(data);
                      localStorage.setItem('smartdock_bookings', JSON.stringify(data));
                      setIsCloudConnected(true);
                  } catch(e) { }
              });
              docksRef.on('value', (snapshot) => {
                  try {
                      const data = safeParseArray(snapshot.val());
                      setDocksList(data.map(d => typeof d === 'string' ? { name: d, status: 'Available' } : d));
                      localStorage.setItem('smartdock_docks', JSON.stringify(data));
                  } catch(e) { }
              });
              return () => { bookingsRef.off(); docksRef.off(); };
          }, []);

          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          const checkDelay = (booking) => {
              if (!booking || booking.status === 'Completed' || booking.status === 'Pending') return false;
              const currentHHMM = currentTime.toLocaleTimeString('th-TH', { hour12: false, hour: '2-digit', minute:'2-digit' });
              return currentHHMM > booking.endTime;
          };

          // Scanner Logic
          useEffect(() => {
            let html5QrCode;
            let isStarted = false;
            if (activeTab === 'scan' && isScanning) {
                html5QrCode = new Html5Qrcode("reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        const formattedScan = decodedText.toUpperCase().replace('-', ' ');
                        const matchedDock = docksList.find(d => d.name.toUpperCase() === formattedScan || d.name.toUpperCase() === decodedText.toUpperCase());
                        let newBookings = [...bookings]; 
                        let index = -1; let msg = ''; let success = true;

                        if (matchedDock) {
                            index = newBookings.findIndex(b => b.allocation === matchedDock.name && b.status !== 'Completed');
                            if (index === -1) {
                                setScanResult({ text: lang==='th'?`ไม่มีคิวงานที่กำลังดำเนินการอยู่ใน ${matchedDock.name}`:`No active booking in ${matchedDock.name}`, isSuccess: false });
                                setIsScanning(false); return;
                            }
                        } else {
                            index = newBookings.findIndex(b => b.shipmentNo.toUpperCase() === decodedText.toUpperCase() || b.license === decodedText);
                            if (index === -1) {
                                setScanResult({ text: lang==='th'?`บาร์โค้ดไม่ตรงกับช่องจอด หรือใบงานใดๆ`:`Barcode does not match any dock or DO`, isSuccess: false });
                                setIsScanning(false); return;
                            }
                        }

                        const booking = newBookings[index];
                        const currentIndex = STATUSES.indexOf(booking.status);
                        let nextStatus = booking.status;

                        if (currentIndex < STATUSES.length - 1) {
                            nextStatus = STATUSES[currentIndex + 1];
                            msg = lang==='th'?`อัปเดตงาน ${booking.shipmentNo} เป็นสถานะ "${t('statusObj')[nextStatus]}" เรียบร้อย!`:`Updated ${booking.shipmentNo} to "${t('statusObj')[nextStatus]}"`;
                            const timeNow = getTimeStr();
                            if (nextStatus === 'Arrived') booking.timeArrived = timeNow;
                            if (nextStatus === 'Loading') booking.timeLoading = timeNow;
                            if (nextStatus === 'WaitingDoc') booking.timeWaitingDoc = timeNow;
                            if (nextStatus === 'Completed') booking.timeCompleted = timeNow;
                        } else {
                            msg = lang==='th'?`งานของ ${booking.shipmentNo} เสร็จสิ้นไปแล้ว`:`Booking ${booking.shipmentNo} is already completed`;
                            success = false;
                        }
                        
                        setScanResult({ text: msg, isSuccess: success });
                        newBookings[index] = { ...booking, status: nextStatus };
                        syncBookingsData(newBookings);
                        setIsScanning(false);
                    },
                    (err) => { }
                ).then(() => { isStarted = true; }).catch((err) => {
                    alert(lang==='th'?"ไม่สามารถเปิดกล้องได้: โปรดตรวจสอบการอนุญาตใช้งานกล้อง":"Cannot access camera. Please check permissions.");
                    setIsScanning(false);
                });
            }
            return () => { if (html5QrCode && isStarted) html5QrCode.stop().catch(e=>console.log(e)); };
        }, [isScanning, activeTab, docksList, bookings, lang]); 

          const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!isPowerUser) return;
            if (formData.startTime >= formData.endTime) return alert(lang==='th'?'เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม':'End time must be after Start time');

            const newBookingData = { ...formData, status: formData.allocation === 'Waitlist' ? 'Pending' : 'Pending' };
            let newBookings;
            if (editingId) {
              newBookings = bookings.map(b => b.id === editingId ? { ...b, ...newBookingData } : b);
            } else {
              newBookings = [...bookings, { ...newBookingData, id: Date.now() }];
            }
            syncBookingsData(newBookings);
            setEditingId(null);
            setFormData({ date: getTodayStr(), startTime: '', endTime: '', shipmentNo: '', vendor: '', packageType: 'พาเลท', qty: '', license: '', vehicle: 'รถ 4 ล้อ', jobType: 'รับเข้า (IN)', allocation: 'Waitlist' });
            if (window.innerWidth < 768) setActiveTab('dashboard');
          };

          const handleEdit = (booking) => {
            if (!isPowerUser) return;
            setFormData(booking);
            setEditingId(booking.id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleDelete = (id) => {
            if (!isPowerUser) return;
            if (window.confirm(lang==='th'?'ยืนยันการลบรายการจองคิวนี้?':'Are you sure to delete this booking?')) syncBookingsData(bookings.filter(b => b.id !== id));
          };

          const cycleStatus = (booking) => {
            if (isOperative || isSup) return alert(lang==='th'?'⚠️ คุณไม่สามารถเปลี่ยนสเตตัสเอกสารได้ (ต้องสแกนบาร์โค้ดหน้างานเท่านั้น)':'⚠️ You cannot manually change document status. Please use scanner.');
            const currentIndex = STATUSES.indexOf(booking.status);
            const nextStatus = STATUSES[(currentIndex + 1) % STATUSES.length];
            const timeNow = getTimeStr();
            const updatedBooking = { ...booking, status: nextStatus };
            if (nextStatus === 'Arrived' && !updatedBooking.timeArrived) updatedBooking.timeArrived = timeNow;
            if (nextStatus === 'Loading' && !updatedBooking.timeLoading) updatedBooking.timeLoading = timeNow;
            if (nextStatus === 'WaitingDoc' && !updatedBooking.timeWaitingDoc) updatedBooking.timeWaitingDoc = timeNow;
            if (nextStatus === 'Completed' && !updatedBooking.timeCompleted) updatedBooking.timeCompleted = timeNow;
            syncBookingsData(bookings.map(b => b.id === booking.id ? updatedBooking : b)); 
          };

          const handleAddDock = () => {
              if (!canManageDocks) return;
              const trimmed = newDockName.trim();
              if (trimmed && !docksList.find(d => d.name === trimmed)) {
                  syncDocksData([...docksList, { name: trimmed, status: 'Available' }]);
                  setNewDockName('');
              }
          };

          const handleRemoveDock = (dockName) => {
              if (!canManageDocks) return;
              if (bookings.some(b => b.allocation === dockName && b.status !== 'Completed')) {
                  alert(lang==='th'?`ไม่สามารถลบ "${dockName}" ได้ เนื่องจากมีคิวจองใช้งานอยู่`:`Cannot delete "${dockName}" because it has active bookings.`);
                  return;
              }
              if (window.confirm(lang==='th'?`ยืนยันการลบ ${dockName}?`:`Confirm deletion of ${dockName}?`)) {
                  syncDocksData(docksList.filter(d => d.name !== dockName));
              }
          };

          const toggleDockStatus = (dockName, currentStatus) => {
              if (!canChangeDockStatus) return;
              let nextStatus = 'Available';
              if (currentStatus === 'Available') nextStatus = 'Busy';
              else if (currentStatus === 'Busy') nextStatus = canManageDocks ? 'Maintenance' : 'Available';
              else if (currentStatus === 'Maintenance') nextStatus = 'Available';
              syncDocksData(docksList.map(d => d.name === dockName ? { ...d, status: nextStatus } : d));
          };

          const handleExportAndClear = () => {
              const completedBookings = bookings.filter(b => b.status === 'Completed');
              if (completedBookings.length === 0) return alert(lang==='th'?'ไม่มีรายการที่ "เสร็จสิ้น" ให้ดึง Report ครับ':'No completed transactions to export.');

              const headers = lang==='th' 
                ? ['วันที่', 'ช่องจอด', 'งาน/DO', 'บริษัท', 'ทะเบียนรถ', 'Plan เข้า', 'Plan ออก', 'เวลามาดึง', 'เวลาโหลด', 'เวลารอเอกสาร', 'เวลาเสร็จสิ้น']
                : ['Date', 'Dock', 'DO No.', 'Company', 'License Plate', 'Plan In', 'Plan Out', 'Time Arrived', 'Time Loading', 'Time Wait Doc', 'Time Completed'];
                
              const rows = completedBookings.map(b => [
                  b.date, b.allocation, b.shipmentNo, b.vendor, b.license, 
                  b.startTime, b.endTime, 
                  b.timeArrived||'-', b.timeLoading||'-', b.timeWaitingDoc||'-', b.timeCompleted||'-'
              ]);

              const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
              const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
              const link = document.createElement("a");
              const url = URL.createObjectURL(blob);
              link.setAttribute("href", url);
              link.setAttribute("download", `Dock_Report_${getTodayStr()}.csv`);
              link.style.visibility = 'hidden';
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);

              setTimeout(() => {
                  if (window.confirm(lang==='th'?'✅ ดาวน์โหลดไฟล์ Excel เรียบร้อยแล้ว!\n\nต้องการ "ลบรายการที่เสร็จสิ้น" ออกจากหน้าจอเพื่อเคลียร์ฐานข้อมูลหรือไม่?':'✅ Export successful!\n\nClear completed data from screen/database?')) {
                      const activeBookings = bookings.filter(b => b.status !== 'Completed');
                      syncBookingsData(activeBookings);
                  }
              }, 500);
          };

          const waitlistBookings = bookings.filter(b => b.allocation === 'Waitlist' && b.status !== 'Completed');
          const dockBookings = bookings.filter(b => b.allocation !== 'Waitlist' && b.status !== 'Completed');

          // --- Custom Tab Button ---
          const TabBtn = ({ id, label, iconClass, hidden }) => {
              if (hidden) return null;
              const isActive = activeTab === id;
              return (
                  <button 
                      onClick={() => setActiveTab(id)} 
                      className={`whitespace-nowrap flex items-center text-xs md:text-sm font-semibold py-2 px-4 rounded-full transition-all duration-300 ${isActive ? 'bg-white text-indigo-700 shadow-md scale-105' : 'bg-transparent text-slate-300 hover:bg-slate-800 hover:text-white'}`}
                  >
                      {label}
                  </button>
              );
          };

          const StatusBadge = ({ booking }) => {
            const colorClass = STATUS_COLORS[booking.status];
            const labelText = t('statusObj')[booking.status];
            return (
                <span 
                    onClick={(e) => { e.stopPropagation(); cycleStatus(booking); }}
                    className={`px-2.5 py-1 rounded-full shadow-sm text-[11px] font-bold border cursor-pointer select-none transition-colors flex items-center ${colorClass} ${!isPowerUser ? 'pointer-events-none' : ''}`}
                >
                    {labelText}
                </span>
            );
          };

          return (
            <div className="flex flex-col h-full w-full relative bg-slate-50">
                
                {/* 🔴 HEADER BAR */}
                <header className="bg-slate-900 text-white flex flex-col md:flex-row items-center justify-between px-6 py-3 shrink-0 shadow-lg z-10 print-hidden border-b border-slate-800">
                    <div className="flex items-center justify-between w-full md:w-auto mb-3 md:mb-0">
                        <div className="flex items-center">
                            <div className="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center mr-3 shadow-lg shadow-indigo-500/30 text-white font-black text-xl">S</div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight tracking-wide">{t('appTitle')}</h1>
                                <div className="text-[11px] text-slate-400 flex items-center">
                                    <span className={`w-2 h-2 rounded-full inline-block mr-1.5 ${isCloudConnected ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]' : 'bg-amber-400 animate-pulse'}`}></span>
                                    Firebase {isCloudConnected ? t('online') : t('connecting')}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-col md:flex-row items-center w-full md:w-auto space-y-3 md:space-y-0 md:space-x-4">
                        <div className="flex space-x-1 overflow-x-auto hide-scrollbar w-full md:w-auto justify-start md:justify-center bg-slate-900 md:bg-slate-800/50 p-1 rounded-full border border-slate-700/50">
                            <TabBtn id="dashboard" label={t('tabDash')} />
                            <TabBtn id="schedule" label={t('tabSchedule')} hidden={!isPowerUser} />
                            <TabBtn id="list" label={t('tabList')} hidden={!isPowerUser} />
                            <TabBtn id="barcode" label={t('tabBarcode')} hidden={!isPowerUser} />
                            <TabBtn id="reports" label={t('tabReports')} hidden={!isPowerUser} />
                            <TabBtn id="scan" label={t('tabScan')} hidden={isSup} />
                        </div>

                        <div className="flex items-center space-x-3">
                            {/* Language Toggle */}
                            <button 
                                onClick={() => setLang(lang === 'th' ? 'en' : 'th')}
                                className="flex items-center bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs font-bold text-slate-200 transition-colors"
                            >
                                {lang === 'th' ? '🇹🇭 TH' : '🇬🇧 EN'}
                            </button>

                            {/* Role Switcher */}
                            <div className="flex items-center border border-slate-700 rounded-lg bg-slate-800 px-3 py-1.5 shadow-inner">
                                <span className="text-[11px] text-slate-400 mr-2">{t('roleLabel')}</span>
                                <select value={currentUserRole} onChange={e => setCurrentUserRole(e.target.value)} className="bg-transparent text-white text-xs font-bold focus:outline-none cursor-pointer">
                                    {ROLES.map(r => <option key={r} value={r} className="text-slate-900 bg-white">{r}</option>)}
                                </select>
                            </div>
                        </div>
                    </div>
                </header>

                {/* 🔴 MAIN CONTENT AREA */}
                <div className="flex-1 overflow-y-auto md:overflow-hidden flex flex-col md:flex-row p-4 md:p-6 gap-6">
                    
                    {/* LEFT COLUMN: FORM */}
                    {isPowerUser && activeTab === 'dashboard' && (
                        <div className="w-full md:w-[340px] shrink-0 flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden h-auto md:h-full print-hidden flex animate-fade-in">
                            <div className="p-4 border-b border-slate-100 flex items-center bg-slate-50/50">
                                <h2 className="font-bold text-indigo-900 text-sm">{editingId ? t('formTitleEdit') : t('formTitleAdd')}</h2>
                            </div>
                            
                            <div className="p-5 flex-1 md:overflow-y-auto dock-scroll text-sm bg-white">
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">{t('dateLabel')}</label>
                                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full border border-slate-200 rounded-xl p-2.5 mb-2 bg-slate-50 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all" required />
                                        <div className="flex space-x-2 items-center">
                                            <input type="time" name="startTime" value={formData.startTime} onChange={handleInputChange} className="w-1/2 border border-slate-200 rounded-xl p-2.5 bg-slate-50 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all" required />
                                            <span className="text-slate-400 font-bold">-</span>
                                            <input type="time" name="endTime" value={formData.endTime} onChange={handleInputChange} className="w-1/2 border border-slate-200 rounded-xl p-2.5 bg-slate-50 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all" required />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">{t('doLabel')}</label>
                                            <input type="text" name="shipmentNo" value={formData.shipmentNo} onChange={handleInputChange} className="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all bg-slate-50 focus:bg-white" required />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">{t('vendorLabel')}</label>
                                            <input type="text" name="vendor" value={formData.vendor} onChange={handleInputChange} className="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all bg-slate-50 focus:bg-white" required />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">{t('licenseLabel')}</label>
                                        <input type="text" name="license" value={formData.license} onChange={handleInputChange} className="w-full border border-slate-200 rounded-xl p-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all bg-slate-50 focus:bg-white" required />
                                    </div>
                                    <div className="pt-2">
                                        <label className="block text-xs font-bold text-indigo-600 mb-1.5 uppercase tracking-wider">{t('bayLabel')}</label>
                                        <select name="allocation" value={formData.allocation} onChange={handleInputChange} className="w-full border border-indigo-200 rounded-xl p-2.5 outline-none bg-indigo-50/50 font-bold text-indigo-900 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all">
                                            <option value="Waitlist">{t('waitlistOpt')}</option>
                                            {docksList.map(d => <option key={d.name} value={d.name}>{t('bayOptPrefix')} {d.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="pt-4 mt-2 border-t border-slate-100">
                                        <button type="submit" className="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-md font-bold text-sm transition-all transform hover:-translate-y-0.5">{editingId ? t('btnSaveEdit') : t('btnSaveAdd')}</button>
                                        {editingId && <button type="button" onClick={() => {setEditingId(null); setFormData({ date: getTodayStr(), startTime: '', endTime: '', shipmentNo: '', vendor: '', packageType: 'พาเลท', qty: '', license: '', vehicle: 'รถ 4 ล้อ', jobType: 'รับเข้า (IN)', allocation: 'Waitlist' })}} className="w-full py-2.5 mt-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold transition-colors">{t('btnCancel')}</button>}
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* RIGHT COLUMN: DYNAMIC VIEWS */}
                    <div className={`flex-1 flex flex-col min-w-0 h-auto md:h-full overflow-hidden transition-all gap-4`}>
                        
                        {/* VIEW: DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <>
                                {/* Waitlist Strip */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 shrink-0 flex flex-col animate-fade-in">
                                    <div className="p-3.5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-2xl">
                                        <h3 className="font-bold text-slate-800 flex items-center text-sm">
                                            <svg className="w-4 h-4 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                                            {t('waitlistTitle')}
                                        </h3>
                                        <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">{waitlistBookings.length}</span>
                                    </div>
                                    <div className="p-4 flex overflow-x-auto dock-scroll gap-4 bg-white snap-x rounded-b-2xl">
                                        {waitlistBookings.map((booking, idx) => (
                                            <div key={booking.id} className="w-[260px] shrink-0 border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col bg-white snap-center hover:border-indigo-300 hover:shadow-md transition-all group">
                                                <div className="px-3 py-2 bg-slate-50 flex justify-between items-center border-b border-slate-100">
                                                    <span className="font-bold text-slate-700 text-sm">{t('queuePre')}{idx + 1}</span>
                                                    <StatusBadge booking={booking} />
                                                </div>
                                                <div className="p-3 flex-1 text-xs text-slate-600 space-y-1.5 relative">
                                                    {isPowerUser && (
                                                        <div className="absolute top-2 right-2 flex space-x-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-200">
                                                            <button onClick={() => handleEdit(booking)} className="p-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 shadow-sm"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                                        </div>
                                                    )}
                                                    <div className="font-bold text-slate-800 text-sm flex items-center">{booking.license}</div>
                                                    <div>{booking.shipmentNo} <span className="text-slate-400">|</span> {booking.vendor}</div>
                                                    <div className="font-semibold text-indigo-600 bg-indigo-50 inline-block px-2 py-0.5 rounded">{booking.startTime} - {booking.endTime}</div>
                                                </div>
                                                {isPowerUser && (
                                                    <button onClick={() => handleEdit(booking)} className="w-full py-2.5 bg-slate-50 text-indigo-600 text-xs font-bold hover:bg-indigo-50 transition-colors border-t border-slate-100 flex justify-center items-center">
                                                        {t('btnAssign')}
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        {waitlistBookings.length === 0 && <div className="w-full text-center py-6 text-slate-400 text-sm font-medium">{t('emptyWaitlist')}</div>}
                                    </div>
                                </div>

                                {/* Live Dock Board */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden min-h-[400px] animate-fade-in">
                                    <div className="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center shrink-0 gap-3 sm:gap-0 bg-white">
                                        <div className="flex items-center">
                                            <div className="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center mr-3"><svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></div>
                                            <h2 className="font-bold text-lg text-slate-800 tracking-tight">{t('dockBoardTitle')}</h2>
                                            {canManageDocks && (
                                                <button onClick={() => setIsDockModalOpen(true)} className="ml-4 bg-slate-100 text-slate-600 border border-slate-200 text-[11px] px-3 py-1.5 rounded-lg shadow-sm hover:bg-slate-200 font-semibold transition-colors">
                                                    {t('btnManageDock')}
                                                </button>
                                            )}
                                        </div>
                                        <div className="flex items-center space-x-3 text-[11px] font-bold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-emerald-400 mr-1.5"></span> {t('statusAvail')}</div>
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-amber-400 mr-1.5"></span> {t('statusBusy')}</div>
                                            <div className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-slate-400 mr-1.5"></span> {t('statusMaint')}</div>
                                            <div className="flex items-center pl-2 border-l border-slate-200"><span className="w-2.5 h-2.5 rounded-full bg-red-500 mr-1.5 animate-pulse-fast shadow-[0_0_5px_rgba(239,68,68,0.8)]"></span> {t('statusDelay')}</div>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto dock-scroll p-5 bg-slate-50/50">
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                            {docksList.map(dock => {
                                                const activeBooking = dockBookings.find(b => b.allocation === dock.name);

                                                if (activeBooking) {
                                                    const isDelay = checkDelay(activeBooking);
                                                    return (
                                                        <div key={dock.name} className={`bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col relative group h-[270px] transition-all hover:shadow-md ${isDelay ? 'border-red-400 ring-2 ring-red-100' : 'border-slate-200 hover:border-indigo-300'}`}>
                                                            {isDelay && (
                                                                <div className="bg-red-500 text-white text-xs font-bold py-1 px-2 text-center animate-pulse flex justify-center items-center">
                                                                    {t('delayWarn')}
                                                                </div>
                                                            )}
                                                            {isPowerUser && (
                                                                <button onClick={() => handleEdit(activeBooking)} className="absolute top-8 right-2 z-10 p-1.5 bg-white/90 text-indigo-600 rounded-lg shadow-sm hover:bg-white"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                                            )}
                                                            
                                                            <div className={`px-4 py-2.5 flex justify-between items-center font-bold text-sm bg-gradient-to-r ${isDelay?'from-red-50 to-white text-red-900 border-b border-red-100':'from-indigo-50/50 to-white text-indigo-900 border-b border-indigo-50'}`}>
                                                                <span className="flex items-center">
                                                                    <div className="w-6 h-6 rounded bg-indigo-100 text-indigo-600 flex items-center justify-center mr-2"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg></div>
                                                                    {dock.name}
                                                                </span>
                                                            </div>

                                                            <div className="p-4 text-xs text-slate-700 flex-1 flex flex-col">
                                                                <div className="flex justify-between items-center mb-3">
                                                                    <StatusBadge booking={activeBooking} />
                                                                    <div className="text-[10px] text-slate-400">{t('updateLate')} {activeBooking.timeWaitingDoc || activeBooking.timeLoading || activeBooking.timeArrived || '-'}</div>
                                                                </div>
                                                                <div className="space-y-1.5 mb-2">
                                                                    <div className="flex"><span className="w-14 text-slate-400">DO:</span><span className="font-bold truncate pr-2 text-slate-800">{activeBooking.shipmentNo}</span></div>
                                                                    <div className="flex"><span className="w-14 text-slate-400">Truck:</span><span className="font-bold truncate pr-2 text-slate-800">{activeBooking.license} <span className="text-slate-400 font-normal">({activeBooking.vendor})</span></span></div>
                                                                </div>
                                                                <div className="bg-slate-50 rounded-xl p-2.5 mt-auto flex justify-between text-center border border-slate-100">
                                                                    <div className="flex-1 border-r border-slate-200">
                                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{t('planOut')}</div>
                                                                        <div className="font-bold text-indigo-600 text-[13px] mt-1">{activeBooking.endTime}</div>
                                                                    </div>
                                                                    <div className="flex-1">
                                                                        <div className="text-[10px] text-slate-400 font-bold uppercase">{t('actualArr')}</div>
                                                                        <div className={`font-bold text-[13px] mt-1 text-slate-700`}>{activeBooking.timeArrived || '-'}</div> 
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                }

                                                let dockBg = 'bg-emerald-50/30 border-emerald-100';
                                                let headerBg = 'text-emerald-800';
                                                let statusText = t('dockAvailTitle');
                                                let statusIcon = <svg className="w-12 h-12 text-emerald-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>;

                                                if (dock.status === 'Busy') {
                                                    dockBg = 'bg-amber-50/30 border-amber-200';
                                                    headerBg = 'text-amber-800';
                                                    statusText = t('dockBusyTitle');
                                                    statusIcon = <svg className="w-12 h-12 text-amber-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>;
                                                } else if (dock.status === 'Maintenance') {
                                                    dockBg = 'bg-slate-100 border-slate-300';
                                                    headerBg = 'text-slate-700';
                                                    statusText = t('dockMaintTitle');
                                                    statusIcon = <svg className="w-12 h-12 text-slate-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
                                                }

                                                return (
                                                    <div key={dock.name} className={`rounded-2xl shadow-sm border border-dashed flex flex-col h-[270px] transition-all bg-white ${canChangeDockStatus ? 'cursor-pointer hover:shadow-md hover:border-solid hover:border-indigo-300 hover:scale-[1.02]' : ''} ${dockBg}`} onClick={() => { if(canChangeDockStatus) toggleDockStatus(dock.name, dock.status); }}>
                                                        <div className={`px-4 py-3 flex justify-between items-center font-bold text-sm ${headerBg}`}>
                                                            <span className="flex items-center">{dock.name}</span>
                                                            {canChangeDockStatus && <span className="text-[9px] bg-white/80 px-2 py-1 rounded-lg border border-slate-200/50 shadow-sm text-slate-500">{t('clickToChange')}</span>}
                                                        </div>
                                                        <div className="flex-1 flex flex-col items-center justify-center opacity-80">
                                                            {statusIcon}
                                                            <div className="font-bold text-sm text-center px-4 leading-tight">{statusText}</div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}

                        {/* VIEW: TIMELINE SCHEDULE */}
                        {activeTab === 'schedule' && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden animate-fade-in">
                                <div className="p-4 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white shrink-0 gap-3 sm:gap-0">
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center">
                                        <div className="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center mr-3"><svg className="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>
                                        {t('scheduleTitle')}
                                    </h3>
                                    <div className="flex flex-wrap gap-3 text-[11px] font-bold text-slate-500 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
                                        <span className="flex items-center"><span className="w-3 h-3 bg-slate-200 rounded mr-1.5"></span> {t('statusObj')['Pending']}</span>
                                        <span className="flex items-center"><span className="w-3 h-3 bg-sky-400 rounded mr-1.5"></span> {t('statusObj')['Arrived']}</span>
                                        <span className="flex items-center"><span className="w-3 h-3 bg-purple-500 rounded mr-1.5"></span> {t('statusObj')['Loading']}</span>
                                        <span className="flex items-center"><span className="w-3 h-3 bg-orange-400 rounded mr-1.5"></span> {t('statusObj')['WaitingDoc']}</span>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-auto p-6 dock-scroll bg-slate-50/50 relative">
                                    <div className="min-w-[900px] bg-white border border-slate-200 rounded-2xl shadow-sm p-4">
                                        <div className="flex border-b border-slate-200 pb-3 relative h-8 ml-24 md:ml-32">
                                            {Array.from({length: 11}, (_, i) => i + 8).map(hour => (
                                                <div key={hour} className="flex-1 text-xs text-slate-400 font-bold relative">
                                                    <span className="absolute -left-4 bg-white px-1">{hour.toString().padStart(2, '0')}:00</span>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-4 space-y-3">
                                            {docksList.map(dock => {
                                                const bookingsInDock = dockBookings.filter(b => b.allocation === dock.name);
                                                return (
                                                    <div key={dock.name} className="flex relative items-center h-16 bg-slate-50/50 rounded-xl border border-slate-100 hover:border-indigo-100 hover:bg-indigo-50/30 transition-colors">
                                                        <div className="w-24 md:w-32 shrink-0 font-bold text-sm text-slate-700 p-2 flex items-center justify-center z-20 border-r border-slate-200">
                                                            {dock.name}
                                                        </div>
                                                        <div className="flex-1 relative h-full">
                                                            <div className="absolute inset-0 flex">
                                                                {Array.from({length: 10}).map((_, i) => <div key={i} className="flex-1 border-r border-slate-200 border-dashed opacity-50"></div>)}
                                                            </div>
                                                            {bookingsInDock.map(booking => {
                                                                const [sH, sM] = booking.startTime.split(':').map(Number);
                                                                const [eH, eM] = booking.endTime.split(':').map(Number);
                                                                const l = Math.max(0, (((sH - 8) * 60 + sM) / 600) * 100);
                                                                const w = Math.min(100, ((((eH * 60 + eM) - (sH * 60 + sM)) / 600) * 100));
                                                                const colors = {
                                                                    'Pending': 'bg-slate-200 border-slate-300 text-slate-700',
                                                                    'Arrived': 'bg-sky-400 border-sky-500 text-sky-900',
                                                                    'Loading': 'bg-purple-500 border-purple-600 text-white',
                                                                    'WaitingDoc': 'bg-orange-400 border-orange-500 text-white',
                                                                    'Completed': 'bg-emerald-500 border-emerald-600 text-white'
                                                                };
                                                                return (
                                                                    <div key={booking.id} className={`absolute top-2.5 bottom-2.5 text-[11px] leading-tight rounded-lg shadow-sm flex flex-col justify-center px-3 cursor-pointer overflow-hidden border transition-transform hover:scale-[1.02] hover:shadow-md z-10 ${colors[booking.status]} ${editingId === booking.id ? 'ring-2 ring-offset-2 ring-indigo-400 scale-105 z-30' : ''}`} style={{left: `${l}%`, width: `${w}%`}} onClick={() => handleEdit(booking)} title={`${booking.vendor}\n${booking.startTime} - ${booking.endTime}`}>
                                                                        <div className="font-bold truncate">{booking.vendor}</div>
                                                                        <div className="truncate opacity-90 hidden md:block">{booking.startTime} - {booking.endTime}</div>
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: BARCODE */}
                        {activeTab === 'barcode' && (
                            <div id="print-area" className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden animate-fade-in">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-white print-hidden">
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center">
                                        <div className="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center mr-3"><svg className="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg></div>
                                        {t('qrTitle')}
                                    </h3>
                                </div>
                                <div className="flex-1 p-6 overflow-auto dock-scroll bg-slate-50/50">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {docksList.map(dock => {
                                            const dockCode = dock.name.toUpperCase().replace(' ', '-'); 
                                            return (
                                                <div key={dock.name} className="bg-white border border-slate-200 p-6 rounded-2xl flex flex-col items-center justify-center shadow-sm gap-4 hover:border-indigo-300 hover:shadow-md transition-all">
                                                    <div className="text-center w-full">
                                                        <div className="font-black text-2xl text-indigo-900 tracking-tight">{dock.name}</div>
                                                        <div className="text-xs text-slate-400 font-medium print-hidden mt-1">{t('qrSub')}</div>
                                                    </div>
                                                    <div className="flex flex-col items-center w-full bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(dockCode)}`} alt={dockCode} className="w-32 h-32 mb-3 object-contain rounded-lg mix-blend-multiply" />
                                                        <div className="text-sm tracking-widest text-slate-800 font-mono font-bold">{dockCode}</div>
                                                    </div>
                                                    <button onClick={() => window.print()} className="print-hidden w-full bg-slate-800 text-white px-4 py-3 rounded-xl font-bold hover:bg-slate-700 shadow-sm transition-colors">{t('btnPrint')}</button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: REPORTS & LIST */}
                        {['reports', 'list'].includes(activeTab) && (
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-auto animate-fade-in">
                                <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-white">
                                    <h3 className="font-bold text-lg text-slate-800 flex items-center">
                                        {activeTab === 'reports' ? (
                                            <><div className="w-8 h-8 rounded-lg bg-emerald-50 flex items-center justify-center mr-3"><svg className="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>{t('reportTitle')}</>
                                        ) : (
                                            <><div className="w-8 h-8 rounded-lg bg-rose-50 flex items-center justify-center mr-3"><svg className="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg></div>{t('tabList')}</>
                                        )}
                                    </h3>
                                    {activeTab === 'reports' && (
                                        <button onClick={handleExportAndClear} className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold py-2 px-4 rounded-xl shadow-sm transition-colors flex items-center">
                                            <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                            {t('btnExport')}
                                        </button>
                                    )}
                                </div>
                                <div className="flex-1 overflow-auto dock-scroll bg-slate-50/50 p-4">
                                    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                                        <table className="w-full text-left border-collapse text-xs md:text-sm min-w-[1000px]">
                                            <thead className="bg-slate-50 text-slate-500 border-b border-slate-200 uppercase tracking-wider text-[10px] md:text-xs">
                                                {activeTab === 'reports' ? (
                                                    <tr>
                                                        <th className="p-4 font-bold">{t('thDate')}</th>
                                                        <th className="p-4 font-bold">{t('thJob')}</th>
                                                        <th className="p-4 font-bold">{t('thLicense')}</th>
                                                        <th className="p-4 font-bold">{t('thDock')}</th>
                                                        <th className="p-4 font-bold bg-blue-50/50 text-blue-700">{t('thPlanIn')}</th>
                                                        <th className="p-4 font-bold text-slate-700">{t('statusObj')['Arrived']}</th>
                                                        <th className="p-4 font-bold text-slate-700">{t('statusObj')['Loading']}</th>
                                                        <th className="p-4 font-bold text-slate-700">{t('statusObj')['WaitingDoc']}</th>
                                                        <th className="p-4 font-bold text-slate-700">{t('statusObj')['Completed']}</th>
                                                        <th className="p-4 font-bold bg-indigo-50/50 text-indigo-700">{t('thPlanOut')}</th>
                                                    </tr>
                                                ) : (
                                                    <tr>
                                                        <th className="p-4 font-bold">{t('thPlanIn')}</th>
                                                        <th className="p-4 font-bold">{t('thJob')}</th>
                                                        <th className="p-4 font-bold">{t('thLicense')}</th>
                                                        <th className="p-4 font-bold">{t('thDock')}</th>
                                                        <th className="p-4 font-bold">Status</th>
                                                        <th className="p-4 font-bold text-center">{t('thAction')}</th>
                                                    </tr>
                                                )}
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {bookings.filter(b => activeTab === 'reports' ? b.status === 'Completed' : b.status !== 'Completed').sort((a,b) => a.startTime.localeCompare(b.startTime)).map(b => (
                                                    <tr key={b.id} className="hover:bg-slate-50/80 transition-colors">
                                                        {activeTab === 'reports' ? (
                                                            <>
                                                                <td className="p-4 text-slate-500">{b.date}</td>
                                                                <td className="p-4 font-bold text-slate-800">{b.shipmentNo} <div className="text-[10px] text-slate-400 font-normal">{b.vendor}</div></td>
                                                                <td className="p-4 text-slate-600">{b.license}</td>
                                                                <td className="p-4 font-bold text-indigo-600">{b.allocation}</td>
                                                                <td className="p-4 font-bold text-blue-600 bg-blue-50/30">{b.startTime}</td>
                                                                <td className="p-4 font-medium text-slate-700">{b.timeArrived || '-'}</td>
                                                                <td className="p-4 font-medium text-slate-700">{b.timeLoading || '-'}</td>
                                                                <td className="p-4 font-medium text-slate-700">{b.timeWaitingDoc || '-'}</td>
                                                                <td className="p-4 font-medium text-slate-700">{b.timeCompleted || '-'}</td>
                                                                <td className="p-4 font-bold text-indigo-600 bg-indigo-50/30">{b.endTime}</td>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <td className="p-4 font-bold text-indigo-600">{b.startTime} - {b.endTime}</td>
                                                                <td className="p-4"><div className="font-bold text-slate-800">{b.shipmentNo}</div><div className="text-xs text-slate-500">{b.vendor}</div></td>
                                                                <td className="p-4 font-bold text-slate-700">{b.license}</td>
                                                                <td className="p-4 font-bold text-indigo-600">{b.allocation}</td>
                                                                <td className="p-4"><StatusBadge booking={b} /></td>
                                                                <td className="p-4 text-center">
                                                                    <div className="flex justify-center space-x-2">
                                                                        <button onClick={() => handleEdit(b)} className="p-2 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg transition-colors"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                                                                        <button onClick={() => handleDelete(b.id)} className="p-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition-colors"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1-1v-2a1 1 0 011-1h2a1 1 0 011 1v2z"></path></svg></button>
                                                                    </div>
                                                                </td>
                                                            </>
                                                        )}
                                                    </tr>
                                                ))}
                                                {bookings.filter(b => activeTab === 'reports' ? b.status === 'Completed' : b.status !== 'Completed').length === 0 && (
                                                    <tr><td colSpan="10" className="p-12 text-center text-slate-400 font-medium">{t('noData')}</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: SCANNER */}
                        {activeTab === 'scan' && (
                             <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col items-center justify-center p-6 overflow-auto animate-fade-in relative overflow-hidden">
                                <div className="absolute top-0 inset-x-0 h-40 bg-gradient-to-b from-indigo-50 to-transparent"></div>
                                <h3 className="font-black text-2xl text-slate-800 mb-2 relative z-10">{t('scanTitle')}</h3>
                                
                                <div className="bg-amber-50/80 border border-amber-200 p-4 rounded-xl mb-6 w-full max-w-sm text-sm text-amber-800 shadow-sm relative z-10 backdrop-blur-sm">
                                    {t('scanInst')}
                                </div>

                                {scanResult.text ? (
                                    <div className={`${scanResult.isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'} border p-6 rounded-2xl text-center max-w-sm w-full shadow-sm relative z-10 animate-fade-in`}>
                                        <div className="text-5xl mb-3">{scanResult.isSuccess ? '✅' : '❌'}</div>
                                        <span className="font-bold text-lg block mb-5">{scanResult.text}</span>
                                        <button onClick={() => setScanResult({ text: '', isSuccess: false })} className="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-md transition-all">{t('btnScanCont')}</button>
                                    </div>
                                ) : (
                                    <div className="w-full max-w-sm flex flex-col items-center relative z-10">
                                        <div id="reader" className="w-full bg-slate-900 min-h-[300px] flex items-center justify-center text-white relative">
                                            {!isScanning && <div className="flex flex-col items-center opacity-50"><svg className="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><span className="text-sm font-medium">{t('camOff')}</span></div>}
                                            {isScanning && <div className="absolute inset-0 border-2 border-indigo-500 rounded-2xl z-10 pointer-events-none"></div>}
                                        </div>
                                        <button onClick={() => setIsScanning(!isScanning)} className={`mt-6 w-full text-white px-6 py-3.5 rounded-xl font-bold shadow-md transition-all flex justify-center items-center ${isScanning ? 'bg-red-500 hover:bg-red-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                            {isScanning ? t('btnCamClose') : t('btnCamOpen')}
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                </div>

                {/* Manage Docks Modal */}
                {isDockModalOpen && canManageDocks && (
                    <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm print-hidden animate-fade-in">
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col scale-100">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h3 className="font-bold text-lg text-slate-800">{t('modalTitle')}</h3>
                                <button onClick={() => setIsDockModalOpen(false)} className="text-slate-400 hover:text-red-500 bg-white hover:bg-red-50 w-8 h-8 flex items-center justify-center rounded-lg transition-colors">✖</button>
                            </div>
                            <div className="p-6 flex-1 overflow-auto max-h-[60vh] bg-white">
                                <div className="flex gap-3 mb-6">
                                    <input type="text" value={newDockName} onChange={e => setNewDockName(e.target.value)} placeholder={t('addDockPlaceholder')} className="flex-1 border border-slate-300 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all bg-slate-50 focus:bg-white" />
                                    <button onClick={handleAddDock} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-sm transition-colors">{t('btnAdd')}</button>
                                </div>
                                <div className="space-y-3">
                                    {docksList.map((dock) => (
                                        <div key={dock.name} className="flex justify-between items-center p-3 border border-slate-200 rounded-xl hover:border-indigo-200 hover:bg-indigo-50/30 transition-colors">
                                            <div className="font-bold text-slate-700 flex items-center">
                                                {dock.name}
                                                <span className={`ml-3 text-[10px] px-2 py-0.5 rounded-md text-white shadow-sm ${dock.status === 'Available' ? 'bg-emerald-500' : dock.status === 'Busy' ? 'bg-amber-500' : 'bg-slate-400'}`}>{dock.status}</span>
                                            </div>
                                            <div className="flex space-x-2">
                                                <button onClick={() => toggleDockStatus(dock.name, dock.status)} className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors">{t('btnToggle')}</button>
                                                <button onClick={() => handleRemoveDock(dock.name)} className="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-100 transition-colors">{t('btnDel')}</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
